version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: bot
      prefix-development: bot
      include: scope
    # Electron and TypeScript majors need dedicated migration PRs (ABI/tooling
    # and typescript-eslint compatibility). Keep them out of grouped majors.
    ignore:
      - dependency-name: electron
        update-types: ["version-update:semver-major"]
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
    groups:
      production-patch-minor:
        dependency-type: production
        update-types:
          - minor
          - patch
      production-major:
        dependency-type: production
        update-types:
          - major
      development-patch-minor:
        dependency-type: development
        update-types:
          - minor
          - patch
      development-major:
        dependency-type: development
        update-types:
          - major
