name: Enable Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: read

concurrency:
  group: enable-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.labels.*.name, 'do-not-automerge')
    runs-on: ubuntu-latest
    steps:
      - name: Enable squash auto-merge when checks pass
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;

            const freezeIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'merge-freeze',
              per_page: 1,
            });
            if (freezeIssues.data.length > 0) {
              core.info('Merge freeze is active — skipping auto-merge enablement.');
              return;
            }

            const { repository } = await github.graphql(
              `query ($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                  }
                }
              }`,
              { owner, repo, number: pullNumber }
            );

            const pullRequestId = repository.pullRequest.id;

            try {
              await github.graphql(
                `mutation ($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }
                  ) {
                    pullRequest {
                      number
                    }
                  }
                }`,
                { pullRequestId }
              );
              core.info(`Auto-merge enabled for PR #${pullNumber}.`);
            } catch (error) {
              const message = error.message ?? String(error);
              if (
                message.includes('not allowed') ||
                message.includes('Pull request auto-merge is not allowed') ||
                message.includes('Cannot enable auto-merge')
              ) {
                core.info(
                  `Auto-merge not enabled for PR #${pullNumber}: ${message}`
                );
                return;
              }
              throw error;
            }
