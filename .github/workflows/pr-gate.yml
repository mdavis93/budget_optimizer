name: PR Gate

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-gate:
    name: pr-gate
    uses: ./.github/workflows/_shared-quality.yml

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6
