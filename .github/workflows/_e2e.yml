name: E2E

on:
  workflow_call:

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        # postinstall builds better-sqlite3/keytar for the Electron ABI and
        # downloads the Electron binary, which is what the E2E suite launches.
        run: pnpm install --frozen-lockfile

      - name: Touchpoint coverage gate + drift checks
        run: pnpm test:e2e:touchpoints

      - name: Install Electron runtime system libraries
        run: |
          pnpm exec playwright install-deps
          sudo apt-get update
          sudo apt-get install -y xvfb libsecret-1-0

      - name: Build renderer + Electron bundle
        run: pnpm build:vite

      - name: Run Playwright E2E (headed under xvfb)
        run: xvfb-run -a pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
