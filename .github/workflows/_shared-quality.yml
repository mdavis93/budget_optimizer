name: Shared Quality Checks

on:
  workflow_call:

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild better-sqlite3 for Node test runtime
        run: pnpm rebuild better-sqlite3

      - name: Block debug telemetry patterns
        run: |
          if rg -q "7289/ingest|#region agent log|debug-f84ef2" src electron; then
            echo "Debug telemetry patterns found in source"
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test with coverage
        run: pnpm test:coverage:check

      - name: Verify production CSP
        run: pnpm run build:vite && pnpm run verify:csp

      - name: Production audit
        run: pnpm audit --prod --audit-level critical
