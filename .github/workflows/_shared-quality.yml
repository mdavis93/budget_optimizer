name: Shared Quality Checks

on:
  workflow_call:

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Block debug telemetry patterns
        run: |
          if rg -q "7289/ingest|#region agent log|debug-f84ef2" src electron; then
            echo "Debug telemetry patterns found in source"
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck (electron project)
        run: pnpm typecheck:electron

      - name: Lint
        run: pnpm lint

      - name: Test with coverage
        run: |
          set -o pipefail
          pnpm test:coverage:check 2>&1 | tee /tmp/test-output.txt

      - name: Verify test output is clean
        run: bash scripts/verify-test-output-clean.sh /tmp/test-output.txt

      - name: Verify production CSP
        run: pnpm run build:vite && pnpm run verify:csp

      - name: Production audit
        run: pnpm audit --prod --audit-level critical

      - name: Dependency audit (full tree)
        run: pnpm audit:dev

      - name: Generate SBOM
        run: pnpm sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error
