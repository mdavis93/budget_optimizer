name: Main Stability

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  quality:
    name: quality
    uses: ./.github/workflows/_shared-quality.yml

  electron-build:
    name: electron-build
    runs-on: macos-latest
    needs: quality
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and verify packaged Electron app
        run: pnpm electron:build:ci
