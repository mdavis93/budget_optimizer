name: Dependabot Refresh

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: read

concurrency:
  group: dependabot-refresh
  cancel-in-progress: false

jobs:
  refresh-dependabot-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Update open Dependabot PR branches when behind main
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const freezeIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'merge-freeze',
              per_page: 1,
            });
            if (freezeIssues.data.length > 0) {
              core.info('Merge freeze is active — skipping Dependabot branch refresh.');
              return;
            }

            const dependabotPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              base: 'main',
              per_page: 100,
            });

            const dependabotPrs = dependabotPulls.filter(
              (pull) => pull.user?.login === 'dependabot[bot]'
            );

            if (dependabotPrs.length === 0) {
              core.info('No open Dependabot pull requests targeting main.');
              return;
            }

            core.info(`Found ${dependabotPrs.length} open Dependabot pull request(s).`);

            for (const pull of dependabotPrs) {
              const pullNumber = pull.number;

              if (pull.draft) {
                core.info(`PR #${pullNumber}: skipped (draft).`);
                continue;
              }

              const labels = (pull.labels ?? []).map((label) => label.name);
              if (labels.includes('do-not-automerge')) {
                core.info(`PR #${pullNumber}: skipped (do-not-automerge label).`);
                continue;
              }

              const compare = await github.rest.repos.compareCommits({
                owner,
                repo,
                base: pull.base.sha,
                head: pull.head.sha,
              });

              if (compare.data.behind_by === 0) {
                core.info(`PR #${pullNumber}: already up to date with main.`);
                continue;
              }

              core.info(
                `PR #${pullNumber}: behind main by ${compare.data.behind_by} commit(s); updating branch.`
              );

              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pullNumber,
                });
                core.info(`PR #${pullNumber}: branch update requested.`);
              } catch (error) {
                const message = error.message ?? String(error);
                core.warning(`PR #${pullNumber}: branch update failed — ${message}`);
              }
            }
